<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 手工形态汇总匹配工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1976d2;
        }
        
        .loading-status {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 14px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .paste-section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #667eea;
        }
        
        .paste-section label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .paste-section textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s;
        }
        
        .paste-section textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .paste-section .paste-hint {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-style: italic;
        }
        
        .btn-parse {
            background: #4caf50;
            color: white;
            margin-top: 10px;
        }
        
        .btn-parse:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
        }
        
        .input-group label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .input-group input {
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-group.required label::after {
            content: ' *';
            color: #e74c3c;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-check {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-check:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-check:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-clear {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-clear:hover {
            background: #d0d0d0;
        }
        
        .result-section {
            margin-top: 30px;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .result-card.matched {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }
        
        .result-card.not-matched {
            background: #ffebee;
            border-left-color: #f44336;
        }
        
        .result-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .result-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .status-matched {
            background: #4caf50;
            color: white;
        }
        
        .status-not-matched {
            background: #f44336;
            color: white;
        }
        
        .rules-list {
            margin-top: 15px;
        }
        
        .rule-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 13px;
            border: 1px solid #e0e0e0;
        }
        
        .rule-item.pred-shang {
            border-left: 4px solid #4caf50;
        }
        
        .rule-item.pred-xia {
            border-left: 4px solid #ff9800;
        }
        
        .rule-item strong {
            color: #667eea;
        }
        
        .prediction-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .prediction-badge.shang {
            background: #4caf50;
            color: white;
        }
        
        .prediction-badge.xia {
            background: #ff9800;
            color: white;
        }
        
        .prediction-badge.zou {
            background: #9e9e9e;
            color: white;
        }
        
        .rules-group {
            margin-top: 15px;
        }
        
        .rules-group-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2026 手工形态汇总匹配工具</h1>
        <p class="subtitle">输入指定列数据，匹配「2026 手工形态汇总类型库（已人工验证）」</p>
        
        <div class="info-box">
            <strong>说明：</strong>
            <ul style="margin: 10px 0 0 20px;">
                <li>先按主/客 + 盘口组合（B/D/F）匹配到汇总分组，再按每行条件逐条比对</li>
                <li>命中后展示：预测、上/走/下、标注、提示</li>
            </ul>
        </div>
        
        <div class="loading-status" id="loadingStatus">正在加载 2026 汇总类型库...</div>
        
        <div class="input-section" id="inputSection" style="display: none;">
            <div class="paste-section">
                <label for="pasteData">快速粘贴（按列顺序：A B C D E F G H I K L M O P Q U V W X，用制表符或空格分隔）：</label>
                <textarea id="pasteData" placeholder="例如：英超	客	4	0	0.8	0	0.78	0	0.02	2.4	3.1	2.7	2.39	2.9	2.74	-0.01	-0.20	0.04	0.15"></textarea>
                <p class="paste-hint">💡 提示：从Excel或表格中复制整行数据，然后粘贴到上方文本框，点击"解析数据"按钮即可自动填充</p>
                <button class="btn-parse" onclick="parsePastedData()">解析数据</button>
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>A (强队)</label>
                    <input type="text" id="A" placeholder="强队">
                </div>
                <div class="input-group required">
                    <label>B (弱队/主客)</label>
                    <input type="text" id="B" placeholder="主/客" required>
                </div>
                <div class="input-group">
                    <label>C (时间)</label>
                    <input type="text" id="C" placeholder="时间">
                </div>
                <div class="input-group required">
                    <label>D (澳门)</label>
                    <input type="text" id="D" placeholder="0" required>
                </div>
                <div class="input-group">
                    <label>E (上水)</label>
                    <input type="text" id="E" placeholder="数值">
                </div>
                <div class="input-group required">
                    <label>F (马会)</label>
                    <input type="text" id="F" placeholder="0" required>
                </div>
                <div class="input-group">
                    <label>G (上水)</label>
                    <input type="text" id="G" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>H (盘差)</label>
                    <input type="text" id="H" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>I (水差)</label>
                    <input type="text" id="I" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>K</label>
                    <input type="text" id="K" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>L（澳）</label>
                    <input type="text" id="L" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>M (马)</label>
                    <input type="text" id="M" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>O</label>
                    <input type="text" id="O" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>P（马）</label>
                    <input type="text" id="P" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>Q</label>
                    <input type="text" id="Q" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>U（主差）</label>
                    <input type="text" id="U" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>V（平差）</label>
                    <input type="text" id="V" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>W（客差）</label>
                    <input type="text" id="W" placeholder="数值">
                </div>
                <div class="input-group">
                    <label>X（澳平客差）</label>
                    <input type="text" id="X" placeholder="数值">
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-check" id="btnCheck" onclick="checkData()">判断</button>
                <button class="btn-clear" onclick="clearData()">清空</button>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在分析...</div>
        </div>
        
        <div class="result-section" id="resultSection">
            <div class="result-card" id="summaryResult">
                <div class="result-title">2026 手工形态汇总类型库（已人工验证）</div>
                <div class="result-status" id="summaryStatus"></div>
                <div class="rules-list" id="summaryRules"></div>
            </div>
        </div>
    </div>
    
        <script>
        let summaryTypesData = null;
        
        // 加载 2026 手工形态汇总类型库
        async function loadSummaryTypes() {
            try {
                const response = await fetch('static/summary_types_v2.json');
                if (!response.ok) {
                    throw new Error('无法加载汇总类型库（static/summary_types_v2.json）');
                }
                summaryTypesData = await response.json();
                const meta = summaryTypesData.meta || {};
                document.getElementById('loadingStatus').textContent = `2026 汇总类型库已加载（共 ${meta.total_types || 0} 条）`;
                document.getElementById('inputSection').style.display = 'block';
            } catch (error) {
                document.getElementById('loadingStatus').textContent = '2026 汇总类型库加载失败：' + error.message;
                document.getElementById('loadingStatus').style.color = '#f44336';
            }
        }
        
        async function checkData() {
            if (!summaryTypesData) {
                alert('汇总类型库尚未加载，请稍候...');
                return;
            }
            
            // 收集数据
            const data = {};
            const columns = ['A','B','C','D','E','F','G','H','I','K','L','M','O','P','Q','U','V','W','X'];
            for (let col of columns) {
                const input = document.getElementById(col);
                const val = input.value.trim();
                data[col] = val || null;
            }
            
            // 验证必填字段
            if (!data['B'] || !data['D'] || !data['F']) {
                alert('请填写必填字段：B(主客)、D(澳门)、F(马会)');
                return;
            }
            
            // 验证形态
            if (data['B'] !== '主' && data['B'] !== '客') {
                alert('B列必须是"主"或"客"');
                return;
            }
            
            // 显示加载
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('btnCheck').disabled = true;
            
            // 使用setTimeout模拟异步，避免阻塞UI
            setTimeout(() => {
                try {
                    // 检查 2026 汇总类型库匹配
                    const summaryMatched = checkSummaryTypes(data);
                    
                    // 显示结果
                    displayResult({
                        summary: {
                            matched: summaryMatched.length > 0,
                            count: summaryMatched.length,
                            types: summaryMatched
                        }
                    });
                } catch (error) {
                    alert('判断出错：' + error.message);
                } finally {
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('btnCheck').disabled = false;
                }
            }, 100);
        }
        
        function displayResult(result) {
            // 2026 手工汇总类型库
            const summary = result.summary;
            const summaryCard = document.getElementById('summaryResult');
            const summaryStatus = document.getElementById('summaryStatus');
            const summaryRules = document.getElementById('summaryRules');

            if (!summary || !summary.matched) {
                summaryCard.className = 'result-card not-matched';
                summaryStatus.className = 'result-status status-not-matched';
                summaryStatus.textContent = '✗ 当前数据未命中任何 2026 汇总类型';
                summaryRules.innerHTML = '';
            } else {
                summaryCard.className = 'result-card matched';
                summaryStatus.className = 'result-status status-matched';
                summaryStatus.textContent = `✓ 命中 ${summary.count} 条 2026 汇总类型`;

                let html = '';
                for (const t of summary.types) {
                    const s = t.stats || {};
                    const shang = s.shang || 0;
                    const zou = s.zou || 0;
                    const xia = s.xia || 0;
                    const nEff = shang + xia;
                    const nTotal = shang + xia + zou;
                    const mark = t.mark || '';
                    const tip = t.tip || '';
                    let rec = '无明显推荐';
                    let recClass = 'prediction-badge';
                    if (nEff > 0 && shang / nEff > 0.8) {
                        rec = '推荐：上';
                        recClass = 'prediction-badge shang';
                    } else if (nEff > 0 && xia / nEff > 0.8) {
                        rec = '推荐：下';
                        recClass = 'prediction-badge xia';
                    } else if (nTotal > 0 && zou / nTotal === 1) {
                        rec = '推荐：走';
                        recClass = 'prediction-badge zou';
                    }

                    html += `
                        <div class="rule-item">
                            <strong>形态：</strong>${(t.morph || []).join('/')}（分组：${t.group}）<br>
                            <strong>特征：</strong>${t.feature_text || '（无）'}
                            ${rec !== '无明显推荐' ? `<span class="${recClass}">${rec}</span>` : ''}<br>
                            <strong>预测：</strong>${t.prediction || '（无）'}<br>
                            <strong>统计：</strong>上${shang} 下${xia} 走${zou}<br>
                            ${mark ? `<strong>标注：</strong>${mark}<br>` : ''}
                            ${tip ? `<strong>提示：</strong>${tip}` : ''}
                        </div>
                    `;
                }

                summaryRules.innerHTML = html;
            }

            document.getElementById('resultSection').classList.add('show');
        }

        // 使用 2026 汇总类型库判断当前行是否命中人工验证类型
        function checkSummaryTypes(rowData) {
            const matched = [];
            if (!summaryTypesData || !summaryTypesData.types) {
                return matched;
            }

            const B = String(rowData.B || '').trim();
            const D = String(rowData.D || '').trim();
            const F = String(rowData.F || '').trim();

            if (B !== '主' && B !== '客') return matched;

            const morph = [B, D, F];

            function getNum(col) {
                const val = rowData[col];
                if (val === null || val === undefined || val === '') return null;
                const num = parseFloat(val);
                return isNaN(num) ? null : num;
            }

            const vals = {
                G: getNum('G'), // 汇总:马会 -> 输入G(上水)
                I: getNum('I'), // 汇总:水差 -> 输入I
                L: getNum('L'), // 汇总:澳平 -> 输入L(澳)
                O: getNum('O'), // 汇总:马主 -> 输入O
                P: getNum('P'), // 汇总:马平 -> 输入P(马)
                U: getNum('U'), // 汇总:主差 -> 输入U
                V: getNum('V'), // 汇总:平差 -> 输入V
                W: getNum('W'), // 汇总:客差 -> 输入W
                X: getNum('X')  // 汇总:澳平客差 -> 输入X
            };

            const EPS = 1e-9;
            for (const t of summaryTypesData.types) {
                const tm = t.morph || [];
                if (tm.length !== 3) continue;
                if (tm[0] !== morph[0] || tm[1] !== morph[1] || tm[2] !== morph[2]) {
                    continue;
                }

                const conds = t.conditions || {};
                let ok = true;
                outer: for (const [colName, condList] of Object.entries(conds)) {
                    const v = vals[colName];
                    if (v === null || v === undefined) {
                        ok = false;
                        break;
                    }
                    for (const c of condList) {
                        const op = c.op;
                        const val = c.value;
                        if (op === '>=') {
                            if (!(v >= val)) { ok = false; break outer; }
                        } else if (op === '<=') {
                            if (!(v <= val)) { ok = false; break outer; }
                        } else if (op === '>') {
                            if (!(v > val)) { ok = false; break outer; }
                        } else if (op === '<') {
                            if (!(v < val)) { ok = false; break outer; }
                        } else if (op === '=') {
                            if (!(Math.abs(v - val) <= EPS)) { ok = false; break outer; }
                        }
                    }
                }

            if (ok) {
                matched.push(t);
            }
        }

        return matched;
    }
        
        function parsePastedData() {
            const pasteText = document.getElementById('pasteData').value.trim();
            if (!pasteText) {
                alert('请先粘贴数据');
                return;
            }
            
            // 尝试按制表符分割，如果没有制表符则按多个空格分割
            let parts = pasteText.split(/\t/);
            if (parts.length === 1) {
                // 如果没有制表符，尝试按多个空格分割
                parts = pasteText.split(/\s+/);
            }
            
            // 清理每个部分（去除首尾空格）
            parts = parts.map(p => p.trim()).filter(p => p.length > 0);
            
            // 验证数据数量（共19列：A B C D E F G H I K L M O P Q U V W X）
            if (parts.length < 19) {
                alert(`数据列数不足：期望19列（A B C D E F G H I K L M O P Q U V W X），实际${parts.length}列。\n\n请确保数据完整，列之间用制表符或空格分隔。`);
                return;
            }
            
            if (parts.length > 19) {
                alert(`数据列数过多：期望19列（A B C D E F G H I K L M O P Q U V W X），实际${parts.length}列。\n\n将使用前19列数据。`);
            }
            
            // 填充到各个输入框
            const columns = ['A','B','C','D','E','F','G','H','I','K','L','M','O','P','Q','U','V','W','X'];
            for (let i = 0; i < 19 && i < parts.length; i++) {
                const col = columns[i];
                const input = document.getElementById(col);
                if (input) {
                    input.value = parts[i];
                }
            }
            
            // 提示成功
            const hint = document.querySelector('.paste-hint');
            const originalText = hint.textContent;
            hint.textContent = '✓ 数据已成功解析并填充！';
            hint.style.color = '#4caf50';
            setTimeout(() => {
                hint.textContent = originalText;
                hint.style.color = '#666';
            }, 2000);
        }
        
        function clearData() {
            // 清空粘贴框
            document.getElementById('pasteData').value = '';
            // 清空所有输入框
            const columns = ['A','B','C','D','E','F','G','H','I','K','L','M','O','P','Q','U','V','W','X'];
            for (let col of columns) {
                document.getElementById(col).value = '';
            }
            document.getElementById('resultSection').classList.remove('show');
        }
        
        // 回车键提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                checkData();
            }
            // 在粘贴框中按Ctrl+Enter或Cmd+Enter解析
            if (e.key === 'Enter' && e.target.id === 'pasteData' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                parsePastedData();
            }
        });
